name: Frontend Tests (Vitest)

# Define quando esta ação será executada
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Define que todos os comandos npm devem rodar dentro da pasta client
defaults:
  run:
    working-directory: ./client

jobs:
  test:
    name: Run Unit and Integration Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do seu código do GitHub para o servidor virtual
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Prepara o ambiente Node.js (versão 20)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      # 3. Instala as dependências (React, Vite, Vitest, etc.)
      - name: Instalar dependências
        run: npm install

      # 4. Executa os testes automatizados
      # O parâmetro --run impede que o Vitest fique em modo "watch" aguardando mudanças
      - name: Executar Vitest
        run: npx vitest run