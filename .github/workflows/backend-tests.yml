name: Backend Tests (Jest)

# Define os gatilhos de execução
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Define que todos os comandos npm devem correr dentro da pasta server
defaults:
  run:
    working-directory: ./server

jobs:
  test:
    name: Run Unit and Integration Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Faz o checkout do código
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Prepara o ambiente Node.js (versão 20)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      # 3. Instala as dependências do backend (Express, Jest, Supertest, etc.)
      - name: Instalar dependências
        run: npm install

      # 4. Executa a suíte de testes do Jest
      - name: Executar Jest
        run: npx jest